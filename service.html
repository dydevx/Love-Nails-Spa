<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Services</title>
    <style>
        /* Giữ nguyên CSS của bạn và thêm hiệu ứng click nhẹ */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #dfd3c3; }
        .services { padding: 80px 20px; text-align: center; }
        .services h1 { font-size: 50px; color: #6b4f3b; font-family: 'Georgia', serif; margin-bottom: 50px; }
       .service-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* Cố định 4 cột */
    gap: 20px; /* Giảm gap một chút để đủ chỗ trên màn hình nhỏ */
    max-width: 1200px;
    margin: auto;
}
        .card { background: white; border-radius: 20px; padding: 35px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); transition: 0.4s; }
        .card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .icon { font-size: 55px; margin-bottom: 15px; }
        .card h2 { font-size: 28px; color: #6b4f3b; }
        .card p { font-size: 16px; color: #666; margin: 15px 0; }
        .btn { padding: 12px 25px; background: linear-gradient(to right, #b08a5b, #8c6b45); color: white; border-radius: 25px; cursor: pointer; border: none; font-size: 16px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }

        /* POPUP */
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1000; }
        .popup.active { opacity: 1; visibility: visible; }
        .popup-box { background: white; padding: 30px; border-radius: 20px; width: 350px; text-align: center; transform: scale(0.7); transition: 0.3s; }
        .popup.active .popup-box { transform: scale(1); }
        .popup-box h3 { color: #6b4f3b; margin-top: 0; }
        .popup-box p { color: #777; font-size: 14px; }
        .popup-box a { display: inline-block; margin-top: 15px; background: #6b4f3b; color: white; padding: 10px 25px; border-radius: 20px; text-decoration: none; font-weight: bold; }
        .close { margin-top: 15px; display: block; color: #999; cursor: pointer; text-decoration: underline; font-size: 13px; }
        /* Responsive cho Mobile */
@media (max-width: 768px) {
    .services {
        padding: 40px 15px; /* Giảm bớt padding cho đỡ tốn diện tích */
    }

    .services h1 {
        font-size: 35px; /* Chữ nhỏ lại một chút cho vừa màn hình điện thoại */
    }

    .service-grid {
        /* Chuyển từ 4 cột thành 1 cột để cuộn từ trên xuống */
        grid-template-columns: 1fr; 
        gap: 20px;
        padding: 0 10px;
    }

    .card {
        padding: 25px; /* Card gọn gàng hơn trên mobile */
    }
}
    </style>
</head>
<body>

<section class="services">
    <h1>Our Services</h1>
    <div class="service-grid">
        <!-- Card 1 -->
        <div class="card">
            <div class="icon">💅</div>
            <h2>Nail Extensions</h2>
            <p>Luxury acrylic, ombre & builder gel styles.</p>
            <button class="btn" onclick="openPopup('Nail Extensions', 'Premium nail design services', 'https://www.hoangcaster.cloud/LoveNails&Spa_Nail-Extensions')">
                See Service
            </button>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <div class="icon">🖐️</div>
            <h2>Hands</h2>
            <p>Professional manicure and gel polish care.</p>
            <button class="btn" onclick="openPopup('Hands Treatment', 'Professional manicure care', 'https://www.hoangcaster.cloud/LoveNails&Spa_Standard_Treatment-Hands')">
                See Service
            </button>
        </div>

        <!-- Card 3 -->
        <div class="card">
            <div class="icon">🦶</div>
            <h2>Toes</h2>
            <p>Pedicure, spa and extension services.</p>
            <button class="btn" onclick="openPopup('Toes Services', 'Relaxing pedicure and spa', 'https://www.hoangcaster.cloud/LoveNails&Spa_Toes')">
                See Service
            </button>
        </div>

        <!-- Card 4 -->
        <div class="card">
            <div class="icon">✨</div>
            <h2>Add-ons</h2>
            <p>Nail art, diamonds and custom designs.</p>
            <button class="btn" onclick="openPopup('Add-ons', 'Extra nail art and designs', 'https://www.hoangcaster.cloud/LoveNails&Spa_Other_(Add-ons)')">
                See Service
            </button>
        </div>
    </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closePopup(event)">
    <div class="popup-box">
        <h3 id="popupTitle"></h3>
        <p id="popupDesc"></p>
        <a id="popupLink" target="_blank">Open Service Page</a>
        <span class="close">Close</span>
    </div>
</div>

<script>
    function openPopup(title, desc, link) {
        document.getElementById("popup").classList.add("active");
        document.getElementById("popupTitle").innerText = title;
        document.getElementById("popupDesc").innerText = desc;
        document.getElementById("popupLink").href = link;
    }

    function closePopup(e) {
        // Đóng khi bấm ra ngoài box hoặc bấm nút Close
        if (e.target.id === "popup" || e.target.classList.contains("close")) {
            document.getElementById("popup").classList.remove("active");
        }
    }
</script>

</body>
</html>
