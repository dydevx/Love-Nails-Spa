<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Nails & Spa</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
    background: linear-gradient(to right, #f5eee6, #e8dccf);
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-icon {
    width: 50px;
    height: 50px;
    background: #b08a5b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.logo-text {
    font-size: 22px;
    font-weight: bold;
    color: #6b4f3b;
    font-family: 'Georgia', serif;
}

/* MENU */
.nav {
    display: flex;
    gap: 20px;
}

.nav a {
    text-decoration: none;
    color: #6b4f3b;
    font-weight: 500;
    transition: 0.3s;
}

.nav a:hover {
    color: #b08a5b;
}

/* BUTTON */
.btn-book {
    background: #b08a5b;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.btn-book:hover {
    background: #8c6b45;
}
</style>

</head>
<body>

<header class="header">

    <!-- Logo -->
    <div class="logo">
        <div class="logo-icon">💅</div>
        <div class="logo-text">Love Nails & Spa</div>
    </div>

    <!-- Menu -->
    <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Price List</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Button -->
    <a href="#" class="btn-book">Book Now</a>

</header>

</body>
</html>
